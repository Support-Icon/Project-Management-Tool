name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Verify API URL secret
        run: |
          URL="${{ secrets.VITE_API_URL }}"
          if [ -z "$URL" ] || [ "$URL" = "/" ]; then
            echo "::error::Set GitHub secret VITE_API_URL to your Render backend URL (e.g. https://project-management-tool-c6f9.onrender.com). Do NOT use / or the custom domain."
            exit 1
          fi
          case "$URL" in
            http://*|https://*) ;;
            *)
              echo "::error::VITE_API_URL must start with https:// (Render API), got: $URL"
              exit 1
              ;;
          esac
          if echo "$URL" | grep -qiE 'projectflow\.supporticon\.com|github\.io'; then
            echo "::error::VITE_API_URL must be the Render API host, not the frontend domain."
            exit 1
          fi
          echo "VITE_API_URL looks valid (host only check)."

      - name: Build React app
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Custom domain = "/". Only set secret VITE_BASE_URL=/RepoName/ for project pages without a domain.
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL || '/' }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          clean: true
          # Keep GitHub Pages custom domain after clean deploy (set secret CUSTOM_DOMAIN=your.domain.com)
          cname: ${{ secrets.CUSTOM_DOMAIN }}
